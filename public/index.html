<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Swimmers Note Demo</title>
    <style>
      :root{
        color-scheme: light;
        --bg:#f4f7fb;
        --surface:#ffffff;
        --surface-alt:#edf3ff;
        --border:#d8e1f0;
        --text:#16233b;
        --muted:#5f6f8a;
        --primary:#1765ff;
        --primary-strong:#0e4ec7;
        --accent:#0f9d7a;
        --danger:#d64545;
        --shadow:0 18px 40px rgba(23, 46, 89, 0.08);
        --radius:18px;
      }
      *{box-sizing:border-box}
      body{
        margin:0;
        font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(23,101,255,0.12), transparent 30%),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 45%, #eef3f9 100%);
        color:var(--text);
      }
      button, input, select, textarea{font:inherit}
      .shell{max-width:1280px;margin:0 auto;padding:32px 20px 56px}
      .topbar{
        display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:24px
      }
      .headline{max-width:720px}
      .headline h1{margin:0;font-size:40px;line-height:1.05}
      .headline p{margin:12px 0 0;color:var(--muted);font-size:15px;line-height:1.7}
      .nav{
        display:flex;gap:10px;flex-wrap:wrap;padding:8px;border:1px solid rgba(255,255,255,0.6);
        border-radius:999px;background:rgba(255,255,255,0.72);backdrop-filter:blur(18px);box-shadow:var(--shadow)
      }
      .nav button,.ghost-btn,.primary-btn,.chip,.mini-btn{
        border:0;border-radius:999px;cursor:pointer;transition:transform .15s ease, background .2s ease, color .2s ease
      }
      .nav button{padding:12px 18px;background:transparent;color:var(--muted);font-weight:700}
      .nav button.active{background:var(--text);color:#fff}
      .stats{
        display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:14px;margin-bottom:22px
      }
      .stat,.card{
        background:rgba(255,255,255,0.86);border:1px solid rgba(255,255,255,0.75);
        border-radius:var(--radius);box-shadow:var(--shadow)
      }
      .stat{padding:18px}
      .stat-label{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
      .stat-value{font-size:28px;font-weight:800}
      .stat-sub{color:var(--muted);font-size:13px;margin-top:6px}
      .dashboard-stack,.practice-layout,.athlete-layout{
        display:grid;gap:18px
      }
      .ai-layout{
        display:grid;grid-template-columns:minmax(0, 1.35fr) minmax(360px, .95fr);gap:18px;align-items:start
      }
      .settings-layout{display:grid;gap:18px}
      .card{padding:22px}
      .section-head{
        display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px
      }
      .section-head h2,.section-head h3,.section-head h4{margin:0}
      .section-head p,.muted{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.6}
      .primary-btn{padding:12px 18px;background:var(--primary);color:#fff;font-weight:700}
      .primary-btn:hover{background:var(--primary-strong);transform:translateY(-1px)}
      .ghost-btn{padding:11px 16px;background:#eff4ff;color:var(--primary);font-weight:700}
      .ghost-btn:hover{background:#e2ebff}
      .mini-btn{padding:8px 12px;background:#eef3ff;color:var(--primary);font-weight:700}
      .stack{display:grid;gap:14px}
      .form-grid{display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:12px}
      .form-row{display:grid;gap:8px}
      .form-row label{font-size:13px;font-weight:700;color:var(--muted)}
      input, select, textarea{
        width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--text);
        outline:none
      }
      input:focus, select:focus, textarea:focus{border-color:#8eb4ff;box-shadow:0 0 0 4px rgba(23,101,255,0.12)}
      .practice-list{display:grid;gap:10px;margin-top:14px;overflow-x:auto}
      .practice-item{
        display:grid;grid-template-columns:150px 110px 110px 110px 120px 120px minmax(260px,1fr) 96px;
        gap:10px;padding:14px;min-width:1180px;align-items:center;
        border:1px solid var(--border);border-radius:16px;background:#fbfdff
      }
      .practice-item.dragging{
        opacity:.45;border-color:#8eb4ff;background:#f4f8ff;
        box-shadow:0 12px 24px rgba(23,101,255,0.14)
      }
      .sub-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.9fr);gap:18px}
      .event-history-list{display:grid;gap:10px}
      .event-history-item{
        display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;padding:12px;border:1px solid var(--border);
        border-radius:16px;background:#fbfdff
      }
      .best-times-list{display:grid;gap:8px;margin-top:12px}
      .best-time-row{
        display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
        background:#f7faff;border:1px solid #e0e9f8;font-size:13px
      }
      .best-time-row.active{border-color:#8eb4ff;box-shadow:0 0 0 3px rgba(23,101,255,0.12)}
      .athlete-detail-card{display:grid;gap:14px}
      .chart-shell{padding:14px;border-radius:16px;background:#f7faff;border:1px solid #e0e9f8}
      .chart-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
      .chart-legend{display:flex;gap:8px;flex-wrap:wrap}
      .legend-pill{padding:6px 10px;border-radius:999px;background:#e7efff;font-size:12px;font-weight:700}
      .trend-grid{display:grid;gap:8px;margin-top:12px}
      .trend-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:#fff;border:1px solid #dde7f7;font-size:13px}
      .trend-up{color:var(--accent);font-weight:700}
      .tag-row,.chips{display:flex;gap:8px;flex-wrap:wrap}
      .chip{padding:8px 12px;background:#edf3ff;color:var(--primary);font-size:13px;font-weight:700}
      .chip.active{background:var(--primary);color:#fff}
      .chip.dim{background:#f1f4f8;color:var(--muted)}
      .athlete-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
      .athlete-card{
        padding:16px;border-radius:18px;border:1px solid var(--border);background:#fff;cursor:pointer;
        transition:transform .15s ease, box-shadow .2s ease, border-color .2s ease
      }
      .team-card{
        min-height:84px;display:grid;place-items:center;text-align:center;background:#f8fbff
      }
      .team-card .athlete-name{margin:0;font-size:26px}
      .athlete-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
      .athlete-card.active{border-color:#92b4ff;box-shadow:0 0 0 4px rgba(23,101,255,0.1)}
      .team-card.active{
        background:linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
        border-color:transparent;
        box-shadow:0 18px 38px rgba(23,101,255,0.28)
      }
      .team-card.active .athlete-name{color:#fff}
      .athlete-name{font-size:18px;font-weight:800;margin:0 0 6px}
      .meta-line{color:var(--muted);font-size:13px;line-height:1.6}
      .list-block{display:grid;gap:12px}
      .practice-card{
        padding:16px;border-radius:16px;border:1px solid var(--border);background:#fff
      }
      .practice-card.active{border-color:#92b4ff;box-shadow:0 0 0 4px rgba(23,101,255,0.1)}
      .practice-card-head{
        display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px
      }
      .practice-card-actions{display:flex;gap:8px;flex-wrap:wrap}
      .practice-scroll{
        max-height:calc(100vh - 240px);overflow:auto;padding-right:4px
      }
      .ai-sidebar,.ai-main{
        min-height:calc(100vh - 180px)
      }
      .ai-main{
        display:grid;gap:18px
      }
      .ai-main-stack{
        display:grid;gap:18px
      }
      .ai-left-stack{
        display:grid;gap:18px
      }
      .ai-sidebar .practice-scroll,
      .ai-main .practice-scroll{
        max-height:calc(100vh - 260px)
      }
      .ai-practice-list{
        display:grid;gap:8px
      }
      .ai-practice-card{
        display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;
        padding:10px 12px;border-radius:14px;border:1px solid var(--border);background:#fff;cursor:pointer;
        transition:transform .15s ease, box-shadow .2s ease, border-color .2s ease
      }
      .ai-practice-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
      .ai-practice-card.active{border-color:#92b4ff;box-shadow:0 0 0 4px rgba(23,101,255,0.1)}
      .ai-practice-card strong{display:block;margin-bottom:2px;font-size:14px;line-height:1.35}
      .ai-practice-card .meta-line{font-size:12px;line-height:1.4}
      .ai-practice-meta{display:flex;justify-content:flex-end;align-items:center;gap:10px;min-width:0;color:var(--muted);font-size:12px;white-space:nowrap}
      .ai-selector-card{
        padding:16px
      }
      .ai-selector-card .section-head{
        margin-bottom:10px
      }
      .ai-selector-card .practice-scroll{
        max-height:180px
      }
      .ai-help-chip-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
      .ai-help-chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;border:1px solid #d7e4fb;background:#f4f8ff;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer}
      .ai-help-chip:hover{background:#e9f1ff}
      .ai-setup-banner{display:grid;gap:10px;margin-bottom:18px}
      .ai-editor-card .practice-list{
        margin-top:0
      }
      .ai-editor-card .section-head{
        margin-bottom:12px
      }
      .ai-editor-card input,
      .ai-editor-card select{
        padding:10px 12px;border-radius:12px
      }
      .ai-editor-meta{
        display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap
      }
      .ai-team-grid{
        display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:8px
      }
      .ai-team-chip{
        min-height:52px;padding:10px 8px;border-radius:14px;font-size:13px
      }
      .ai-team-chip .athlete-name{
        font-size:16px
      }
      .ai-editor-card .practice-item{
        grid-template-columns:96px 72px 72px 78px 78px 92px minmax(120px,1fr) 82px;
        gap:6px;padding:8px 10px;min-width:720px;font-size:12px
      }
      .ai-chat-card{
        display:grid;grid-template-rows:auto minmax(0,1fr) auto;
        min-height:calc(100vh - 180px)
      }
      .ai-chat-card .section-head{
        margin-bottom:12px
      }
      .ai-chat-pane{
        overflow:auto;padding-right:4px;min-height:280px
      }
      .chat-thread{display:grid;gap:12px}
      .chat-bubble{
        max-width:min(820px, 92%);padding:14px 16px;border-radius:18px;white-space:pre-wrap;line-height:1.7
      }
      .chat-bubble .markdown{
        white-space:normal;font-size:14px;line-height:1.7
      }
      .chat-bubble .markdown > :first-child{margin-top:0}
      .chat-bubble .markdown > :last-child{margin-bottom:0}
      .chat-bubble .markdown h1,
      .chat-bubble .markdown h2,
      .chat-bubble .markdown h3,
      .chat-bubble .markdown h4{
        margin:0 0 8px;font-size:15px;line-height:1.4
      }
      .chat-bubble .markdown p{margin:0 0 10px}
      .chat-bubble .markdown ul,
      .chat-bubble .markdown ol{margin:0 0 10px;padding-left:20px}
      .chat-bubble .markdown li{margin:0 0 4px}
      .chat-bubble .markdown code{
        padding:2px 6px;border-radius:8px;background:rgba(12,24,48,0.08);font-family:ui-monospace,SFMono-Regular,Menlo,monospace
      }
      .chat-bubble .markdown pre{
        margin:0 0 10px;padding:12px;border-radius:12px;background:rgba(12,24,48,0.08);overflow:auto
      }
      .chat-bubble .markdown pre code{
        padding:0;background:transparent
      }
      .chat-bubble .markdown blockquote{
        margin:0 0 10px;padding:8px 12px;border-left:3px solid rgba(23,101,255,0.35);background:rgba(23,101,255,0.05)
      }
      .chat-bubble .markdown table{
        width:100%;border-collapse:collapse;margin:0 0 10px;font-size:13px
      }
      .chat-bubble .markdown th,
      .chat-bubble .markdown td{
        border:1px solid rgba(12,24,48,0.12);padding:6px 8px;text-align:left;vertical-align:top
      }
      .chat-bubble.coach .markdown code,
      .chat-bubble.coach .markdown pre{
        background:rgba(255,255,255,0.15)
      }
      .chat-bubble.assistant{
        justify-self:start;background:#f7faff;border:1px solid #dfe8f8;color:var(--text)
      }
      .chat-bubble.coach{
        justify-self:end;background:linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
        color:#fff;box-shadow:0 14px 28px rgba(23,101,255,0.2)
      }
      .chat-role{display:block;margin-bottom:8px;font-size:12px;font-weight:800;opacity:.72}
      .chat-input-shell{
        display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:end;
        padding-top:12px;border-top:1px solid #e0e9f8;background:rgba(255,255,255,0.95)
      }
      .chat-input-shell textarea{min-height:120px;resize:vertical}
      .ai-chat-pane{
        max-height:calc(100vh - 390px);min-height:240px;overflow:auto;padding-right:4px
      }
      .practice-table-wrap{
        margin-top:12px;border-radius:14px;border:1px solid #e0e9f8;background:#f7faff;overflow:auto
      }
      .practice-table{
        width:100%;border-collapse:collapse;font-size:12px;min-width:420px
      }
      .practice-table th,.practice-table td{
        padding:8px 10px;border-bottom:1px solid #e0e9f8;text-align:left;white-space:nowrap
      }
      .practice-table th{color:var(--muted);font-weight:700;background:#eef4ff}
      .practice-table tr:last-child td{border-bottom:0}
      .practice-card pre,.result-box{
        margin:12px 0 0;padding:14px;border-radius:14px;background:#f7faff;border:1px solid #e0e9f8;
        white-space:pre-wrap;color:var(--text)
      }
      .result-box{min-height:220px}
      .inline-actions{display:flex;gap:10px;flex-wrap:wrap}
      .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
      .empty{
        padding:28px;border:1px dashed #c9d6ee;border-radius:18px;background:rgba(255,255,255,0.5);color:var(--muted);text-align:center
      }
      .footer-note{font-size:12px;color:var(--muted)}
      .column-order-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
      .column-order-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:#fbfdff}
      .column-order-item.dragging{opacity:.5;border-color:#8eb4ff;background:#f4f8ff;box-shadow:0 12px 24px rgba(23,101,255,0.14)}
      .column-order-label{font-size:13px;font-weight:700}
      .secret-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
      .status-pill{
        display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;
        background:#edf3ff;color:var(--primary);font-size:13px;font-weight:700
      }
      .status-table{
        display:grid;grid-template-columns:180px minmax(0,1fr);margin-bottom:16px;
        border:1px solid #dfe8f8;border-radius:16px;overflow:hidden;background:#f7faff
      }
      .status-label,.status-value{
        padding:12px 14px;border-bottom:1px solid #dfe8f8;font-size:14px
      }
      .status-label{
        background:#eef4ff;color:var(--muted);font-weight:700
      }
      .status-value{
        background:#fff;color:var(--text);font-weight:700
      }
      .status-table > :nth-last-child(-n + 2){border-bottom:0}
      .help-card{
        padding:16px;border-radius:16px;background:#f7faff;border:1px solid #dfe8f8
      }
      .help-card summary{cursor:pointer;font-weight:800;color:var(--text)}
      .help-card summary::-webkit-details-marker{display:none}
      .help-card ol,.help-card ul{margin:12px 0 0;padding-left:20px;color:var(--muted);line-height:1.8}
      .item-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end}
      .icon-btn{
        width:40px;height:40px;padding:0;display:inline-flex;align-items:center;justify-content:center;
        border:1px solid var(--border);border-radius:12px;background:#fff;color:var(--muted);cursor:pointer
      }
      .icon-btn:hover{background:#f5f8ff;color:var(--primary)}
      .icon-btn.danger:hover{color:var(--danger);background:#fff4f4}
      .drag-handle{cursor:grab}
      .drag-handle:active{cursor:grabbing}
      .drag-handle svg,.icon-btn svg{width:18px;height:18px}
      .spinner{
        width:18px;height:18px;border:2px solid rgba(23,101,255,0.2);border-top-color:var(--primary);
        border-radius:50%;animation:spin .8s linear infinite
      }
      .loading-row{display:flex;align-items:center;gap:10px;color:var(--primary);font-weight:700}
      @keyframes spin{to{transform:rotate(360deg)}}
      @media (max-width: 980px){
        .practice-layout,.athlete-layout,.ai-layout,.sub-grid,.stats,.form-grid{grid-template-columns:1fr}
        .headline h1{font-size:32px}
        .ai-sidebar,.ai-main,.ai-chat-card{min-height:auto}
      }
      @media (max-width: 860px){
        .event-history-item{grid-template-columns:1fr 1fr}
      }
      @media (max-width: 640px){
        .shell{padding:20px 14px 40px}
        .topbar{flex-direction:column}
        .nav{width:100%}
        .nav button{flex:1}
        .event-history-item{grid-template-columns:1fr}
        .status-table{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <div id="app" class="shell"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
      const { createApp, ref, reactive, onMounted, computed, watch, nextTick } = Vue;

      const GROUP_OPTIONS = ['A', 'B', 'C', 'D', '育成', '選抜'];
      const ITEM_TYPES = ['Warmup', 'Drill', 'Kick', 'Pull', 'Swim', 'Main', 'CoolDown'];
      const EVENT_OPTIONS = [
        '50 Free', '100 Free', '200 Free', '400 Free', '800 Free', '1500 Free',
        '50 Back', '100 Back', '200 Back',
        '50 Breast', '100 Breast', '200 Breast',
        '50 Fly', '100 Fly', '200 Fly',
        '200 IM', '400 IM'
      ];
      const STROKE_OPTIONS = ['Fr', 'Ba', 'Br', 'Fly', 'IM', 'Choice'];
      const DISTANCE_OPTIONS = Array.from({ length: 64 }, (_, index) => (index + 1) * 25);
      const REPS_OPTIONS = Array.from({ length: 20 }, (_, index) => index + 1);
      const CYCLE_OPTIONS = Array.from({ length: 121 }, (_, index) => {
        const totalSeconds = index * 5;
        const minutes = String(Math.floor(totalSeconds / 60));
        const seconds = String(totalSeconds % 60).padStart(2, '0');
        return `${minutes}:${seconds}`;
      });
      const DEFAULT_MENU_COLUMN_ORDER = ['type', 'stroke', 'distance', 'sets', 'reps', 'rest', 'note'];
      const MENU_COLUMN_DEFS = [
        { key: 'type', label: '種別' },
        { key: 'stroke', label: '種目' },
        { key: 'distance', label: '距離' },
        { key: 'sets', label: 'セット数' },
        { key: 'reps', label: '本数' },
        { key: 'rest', label: 'cycle' },
        { key: 'note', label: '備考' }
      ];
      const API_BASE = (() => {
        if (window.location.protocol !== 'file:') return '';
        const saved = window.localStorage.getItem('ai_swimmers_api_base');
        return saved ? String(saved).trim().replace(/\/$/, '') : 'http://localhost:3002';
      })();
      const CHART_COLORS = ['#1765ff', '#0f9d7a', '#ff8a00', '#7b61ff', '#e34c67'];

      createApp({
        setup(){
          const title = ref('');
          const athleteList = ref([]);
          const selectedTeams = ref([]);
          const athletePage = ref(null);
          const athleteEditorCard = ref(null);
          const practiceEditorCard = ref(null);
          const editingPracticeId = ref(null);
          const selectedBestEvent = ref('');
          const chatInput = ref('');
          const practiceItems = ref([
            { type: 'Warmup', stroke: 'Fr', distance: 200, sets: 1, reps: 1, rest: '', note: '' }
          ]);
          const practiceList = ref([]);
          const currentPractice = ref(null);
          const created = ref('');
          const generationMessage = ref('');
          const isGenerating = ref(false);
          const draggedPracticeItemIndex = ref(null);
          const draggedMenuColumnKey = ref(null);
          let dragPreviewElement = null;
          const practiceId = ref('');
          const view = ref('dashboard');
          const groupFilter = ref('all');
          const settingsMessage = ref('');
          const aiSettings = reactive({
            provider: 'ollama',
            ollamaBaseUrl: 'http://localhost:11434/v1/chat/completions',
            ollamaModel: 'gemma4:26b',
            openaiApiKey: '',
            openaiApiKeyMasked: '',
            hasOpenAIApiKey: false,
            openaiModel: 'gpt-4.1-mini',
            openaiBaseUrl: 'https://api.openai.com/v1/chat/completions',
            geminiApiKey: '',
            geminiApiKeyMasked: '',
            hasGeminiApiKey: false,
            geminiModel: 'gemini-2.5-flash',
            geminiBaseUrl: 'https://generativelanguage.googleapis.com/v1beta/models',
            menuColumnOrder: [...DEFAULT_MENU_COLUMN_ORDER]
          });

          function parseSwimTime(value){
            if (value == null) return null;
            const text = String(value).trim();
            if (!text) return null;
            if (/^\d+$/.test(text)) {
              const padded = text.padStart(6, '0').slice(-6);
              const minutes = Number(padded.slice(0, 2));
              const seconds = Number(padded.slice(2, 4));
              const centiseconds = Number(padded.slice(4, 6));
              return minutes * 60 + seconds + centiseconds / 100;
            }
            const quotedMatch = text.match(/^(?:(\d+)')?(\d{1,2})"(?:([0-9]{1,2}))?$/);
            if (quotedMatch) {
              const minutes = Number(quotedMatch[1] || '0');
              const seconds = Number(quotedMatch[2] || '0');
              const centiseconds = Number(String(quotedMatch[3] || '0').padEnd(2, '0').slice(0, 2));
              return minutes * 60 + seconds + centiseconds / 100;
            }
            const normalized = text.replace(/"/g, '.').replace(/'/g, ':');
            const parts = normalized.split(':');
            if (parts.length === 1) {
              const total = Number(parts[0]);
              return Number.isFinite(total) ? total : null;
            }
            if (parts.length === 2) {
              const minutes = Number(parts[0]);
              const seconds = Number(parts[1]);
              const total = minutes * 60 + seconds;
              return Number.isFinite(total) ? total : null;
            }
            if (parts.length === 3) {
              const minutes = Number(parts[0]);
              const seconds = Number(parts[1]);
              const centiseconds = Number(parts[2]);
              const total = minutes * 60 + seconds + centiseconds / 100;
              return Number.isFinite(total) ? total : null;
            }
            return null;
          }

          function timeToSeconds(value){
            const parsed = parseSwimTime(value);
            return parsed == null ? NaN : parsed;
          }

          function formatSwimTime(value){
            const seconds = typeof value === 'number' ? value : parseSwimTime(value);
            if (!Number.isFinite(seconds)) return value ? String(value) : '';
            const totalCentiseconds = Math.round(seconds * 100);
            const minutes = Math.floor(totalCentiseconds / 6000);
            const secondsPart = Math.floor((totalCentiseconds % 6000) / 100);
            const centiseconds = totalCentiseconds % 100;
            return `${String(minutes).padStart(2, '0')}'${String(secondsPart).padStart(2, '0')}"${String(centiseconds).padStart(2, '0')}`;
          }

          function formatDelta(value){
            if (!Number.isFinite(value)) return `0'00"00`;
            return formatSwimTime(Math.abs(value));
          }

          function buildAthleteChart(events, selectedEvent){
            const validEvents = (events || []).filter((entry) => entry && entry.event && entry.time && entry.date && (!selectedEvent || entry.event === selectedEvent));
            const grouped = {};
            for (const entry of validEvents) {
              if (!grouped[entry.event]) grouped[entry.event] = [];
              grouped[entry.event].push(entry);
            }
            const series = Object.entries(grouped)
              .map(([event, entries], index) => ({
                event,
                color: CHART_COLORS[index % CHART_COLORS.length],
                points: entries
                  .slice()
                  .sort((a, b) => (a.date || '').localeCompare(b.date || ''))
                  .map((entry) => ({ ...entry, seconds: timeToSeconds(entry.time) }))
                  .filter((entry) => Number.isFinite(entry.seconds))
              }))
              .filter((seriesItem) => seriesItem.points.length >= 2);
            if (series.length === 0) return null;
            const allPoints = series.flatMap((seriesItem) => seriesItem.points);
            const minTime = Math.min(...allPoints.map((point) => point.seconds));
            const maxTime = Math.max(...allPoints.map((point) => point.seconds));
            const minDate = new Date(Math.min(...allPoints.map((point) => new Date(point.date).getTime())));
            const maxDate = new Date(Math.max(...allPoints.map((point) => new Date(point.date).getTime())));
            const width = 620;
            const height = 240;
            const padding = 28;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;
            const dateRange = Math.max(maxDate.getTime() - minDate.getTime(), 1);
            const timeRange = Math.max(maxTime - minTime, 0.01);
            return {
              width,
              height,
              series: series.map((seriesItem) => ({
                ...seriesItem,
                path: seriesItem.points.map((point, index) => {
                  const x = padding + ((new Date(point.date).getTime() - minDate.getTime()) / dateRange) * chartWidth;
                  const y = padding + ((point.seconds - minTime) / timeRange) * chartHeight;
                  return `${index === 0 ? 'M' : 'L'} ${x.toFixed(2)} ${y.toFixed(2)}`;
                }).join(' ')
              })),
              yLabels: [minTime, (minTime + maxTime) / 2, maxTime].map((value) => ({
                value,
                label: formatSwimTime(value),
                y: padding + ((value - minTime) / timeRange) * chartHeight
              })),
              xLabels: [minDate, maxDate].map((date) => ({
                label: `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`,
                x: padding + ((date.getTime() - minDate.getTime()) / dateRange) * chartWidth
              }))
            };
          }

              if (message.includes('expected pattern')) {

              }
              if (message.includes('Failed to fetch')) {
                throw new Error('ローカルAPIに接続できませんでした。`npm start` または `npm run start:desktop` でアプリを起動し直してください。');
              }
              throw error;
            }
            const contentType = String(response.headers.get('content-type') || '').toLowerCase();
            if (!contentType.includes('application/json')) {
              const text = await response.text();
              if (text.includes('<!DOCTYPE html') || text.includes('<html')) {
                if (path.includes('/chat')) {
                  throw new Error('AIチャットAPIが見つかりません。古いサーバーが起動している可能性があります。`npm start` または `npm run start:desktop` をやり直して最新のサーバーに更新してください。');
                }
                throw new Error('APIの代わりにHTMLが返ってきました。ローカルサーバーの再起動後に、`http://localhost:3002` か `start:desktop` で開いた画面を使ってください。');
              }
              throw new Error('API応答の形式が正しくありません。ローカルサーバーを再起動してください。');
            }
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data && data.error ? data.error : 'Request failed');
            }
            return data;
          }

          function escapeHtml(value){
            return String(value || '')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#39;');
          }

          function parseInlineMarkdown(text){
            return String(text || '')
              .replace(/`([^`]+)`/g, '<code>$1</code>')
              .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
              .replace(/\*([^*]+)\*/g, '<em>$1</em>');
          }

          function renderMarkdownTable(block){
            const lines = block.split('\n').map((line) => line.trim()).filter(Boolean);
            if (lines.length < 2) return '';
            const divider = lines[1];
            if (!/^\|?[\s:-]+\|[\s|:-]*$/.test(divider)) return '';
            const rows = lines
              .filter((_, index) => index !== 1)
              .map((line) => line.replace(/^\||\|$/g, '').split('|').map((cell) => parseInlineMarkdown(cell.trim())));
            if (!rows.length) return '';
            const header = rows[0];
            const body = rows.slice(1);
            return `<table><thead><tr>${header.map((cell) => `<th>${cell}</th>`).join('')}</tr></thead><tbody>${body.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
          }

          function renderMarkdown(text){
            const source = escapeHtml(String(text || '').trim());
            if (!source) return '';

            const codeBlocks = [];
            let working = source.replace(/```([\s\S]*?)```/g, (_, code) => {
              const token = `@@CODEBLOCK${codeBlocks.length}@@`;
              codeBlocks.push(`<pre><code>${code.trim()}</code></pre>`);
              return token;
            });

            const lines = working.split('\n');
            const html = [];
            let listType = null;
            let paragraph = [];

            function flushParagraph(){
              if (!paragraph.length) return;
              const block = paragraph.join('\n').trim();
              paragraph = [];
              if (!block) return;
              if (block.includes('\n') && block.split('\n').every((line) => line.includes('|'))) {
                const tableHtml = renderMarkdownTable(block);
                if (tableHtml) {
                  html.push(tableHtml);
                  return;
                }
              }
              html.push(`<p>${parseInlineMarkdown(block).replace(/\n/g, '<br>')}</p>`);
            }

            function closeList(){
              if (!listType) return;
              html.push(listType === 'ul' ? '</ul>' : '</ol>');
              listType = null;
            }

            for (const rawLine of lines) {
              const line = rawLine.trimEnd();
              const trimmed = line.trim();
              if (!trimmed) {
                flushParagraph();
                closeList();
                continue;
              }
              if (/^@@CODEBLOCK\d+@@$/.test(trimmed)) {
                flushParagraph();
                closeList();
                html.push(trimmed);
                continue;
              }
              const headingMatch = trimmed.match(/^(#{1,4})\s+(.*)$/);
              if (headingMatch) {
                flushParagraph();
                closeList();
                const level = headingMatch[1].length;
                html.push(`<h${level}>${parseInlineMarkdown(headingMatch[2])}</h${level}>`);
                continue;
              }
              const quoteMatch = trimmed.match(/^>\s?(.*)$/);
              if (quoteMatch) {
                flushParagraph();
                closeList();
                html.push(`<blockquote>${parseInlineMarkdown(quoteMatch[1])}</blockquote>`);
                continue;
              }
              const orderedMatch = trimmed.match(/^\d+\.\s+(.*)$/);
              if (orderedMatch) {
                flushParagraph();
                if (listType && listType !== 'ol') closeList();
                if (!listType) {
                  listType = 'ol';
                  html.push('<ol>');
                }
                html.push(`<li>${parseInlineMarkdown(orderedMatch[1])}</li>`);
                continue;
              }
              const unorderedMatch = trimmed.match(/^[-*]\s+(.*)$/);
              if (unorderedMatch) {
                flushParagraph();
                if (listType && listType !== 'ul') closeList();
                if (!listType) {
                  listType = 'ul';
                  html.push('<ul>');
                }
                html.push(`<li>${parseInlineMarkdown(unorderedMatch[1])}</li>`);
                continue;
              }
              paragraph.push(trimmed);
            }

            flushParagraph();
            closeList();

            let rendered = html.join('');
            rendered = rendered.replace(/@@CODEBLOCK(\d+)@@/g, (_, index) => codeBlocks[Number(index)] || '');
            return rendered;
          }

            const data = await fetchJson(isUpdate ? '/api/practice/' + editingPracticeId.value : '/api/practice', {

                    >

                          <option v-for="type in ITEM_TYPES" :key="type">{{ type }}</option>

                          <option v-for="reps in REPS_OPTIONS" :key="'ai-reps-' + reps" :value="reps">{{ reps }}</option>
                        </select>
                        <select v-else-if="column.key === 'rest'" v-model="item.rest">

                    <g v-for="label in currentAthleteChart.yLabels" :key="label.value">
                      <line x1="28" :y1="label.y" x2="592" :y2="label.y" stroke="#edf2fb" />

                    <g v-for="label in currentAthleteChart.xLabels" :key="label.label">

                    </g>
                    <path
                      v-for="series in currentAthleteChart.series"

                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>

                  <div class="trend-grid" v-if="selectedBestEvent && currentAthleteTrendRows.length">

                  </div>
                </section>
              </div>
            </section>

                    <h3>{{ athleteForm.id ? '選手を編集' : '新規選手を登録' }}</h3>
